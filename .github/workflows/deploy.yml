name: Deploy to GitHub Pages

# Publishes the app to GitHub Pages on every push to main.
# Settings → Pages → Source must be set to "GitHub Actions" once, in the repo.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # The app is a static site served from the repo root.
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
